<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Page Not Found | John Buladaco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Mono',monospace;background:#fff;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;background-image:radial-gradient(circle,#ddd 1px,transparent 1px);background-size:24px 24px}
.container{max-width:500px}
.code{font-family:'VT323',monospace;font-size:clamp(80px,15vw,160px);line-height:1;margin-bottom:1rem;letter-spacing:-2px}
.message{font-size:18px;margin-bottom:0.5rem;font-weight:700}
.sub{font-size:14px;color:#666;margin-bottom:2rem;line-height:1.6}
.btn{display:inline-block;padding:14px 28px;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;text-decoration:none;border:2px solid #1a1a1a;background:#1a1a1a;color:#fff;transition:transform 0.2s,box-shadow 0.2s}
.btn:hover{transform:translate(-3px,-3px);box-shadow:3px 3px 0 #1a1a1a}
</style>
</head>
<body>
<div class="container">
<div class="code">404</div>
<p class="message">Page not found.</p>
<p class="sub">The page you're looking for doesn't exist or has been moved.</p>
<a href="/" class="btn">← Back to Home</a>
</div>
</body>
</html>
