<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Page Not Found | John Buladaco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Mono',monospace;background:#fff;color:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;overflow:hidden;background-image:radial-gradient(circle,#ccc 1px,transparent 1px);background-size:16px 16px}
.container{max-width:600px;position:relative;z-index:2}
.game-area{position:relative;height:160px;margin-bottom:2rem;display:flex;align-items:center;justify-content:center}
.digits{font-family:'VT323',monospace;font-size:clamp(80px,15vw,140px);line-height:1;letter-spacing:8px;display:flex;gap:4px}
.digit{display:inline-block;transition:opacity 0.3s,transform 0.3s}
.digit.eaten{opacity:0;transform:scale(0.3)}
.pacman{position:absolute;left:0;top:50%;transform:translateY(-50%);width:60px;height:60px;animation:moveRight 4s ease-in-out infinite}
.pacman-body{width:60px;height:60px;position:relative}
.pacman-top,.pacman-bottom{position:absolute;width:60px;height:30px;background:#000;left:0}
.pacman-top{top:0;border-radius:30px 30px 0 0;animation:chomp-top 0.25s ease-in-out infinite}
.pacman-bottom{bottom:0;border-radius:0 0 30px 30px;animation:chomp-bottom 0.25s ease-in-out infinite}
.pacman-eye{position:absolute;width:8px;height:8px;background:#fff;border-radius:50%;top:12px;left:32px;z-index:1}
.dots-row{position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;display:flex;justify-content:space-around;padding:0 80px}
.dot{width:8px;height:8px;background:#000;border-radius:50%;transition:opacity 0.2s}
.dot.eaten{opacity:0}
.ghost{position:absolute;right:20px;top:50%;transform:translateY(-50%);width:40px;height:44px;animation:ghostFloat 2s ease-in-out infinite;transition:opacity 0.3s,transform 0.3s}
.ghost.eaten{opacity:0;transform:translateY(-50%) scale(0.3)}
.ghost-body{width:40px;height:36px;background:#000;border-radius:20px 20px 0 0;position:relative}
.ghost-skirt{display:flex;position:absolute;bottom:-8px;left:0;right:0}
.ghost-skirt span{flex:1;height:8px;background:#000;border-radius:0 0 50% 50%}
.ghost-eye{position:absolute;width:10px;height:12px;background:#fff;border-radius:50%;top:12px}
.ghost-eye::after{content:'';position:absolute;width:5px;height:6px;background:#000;border-radius:50%;bottom:2px;left:3px}
.ghost-eye.left{left:8px}
.ghost-eye.right{right:8px}
.message{font-family:'VT323',monospace;font-size:28px;margin-bottom:0.5rem;font-weight:700}
.sub{font-size:14px;color:#666;margin-bottom:2rem;line-height:1.6}
.btn{display:inline-block;padding:14px 28px;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;text-decoration:none;border:2px solid #000;background:#000;color:#fff;transition:transform 0.2s,box-shadow 0.2s,background 0.2s,color 0.2s}
.btn:hover{transform:translate(-3px,-3px);box-shadow:3px 3px 0 #000;background:#fff;color:#000}
.maze-border{position:fixed;inset:12px;border:2px solid #000;pointer-events:none;z-index:1}
.score{position:fixed;top:24px;left:36px;font-family:'VT323',monospace;font-size:20px;color:#000;z-index:3}
@keyframes moveRight{0%{left:-80px}40%{left:calc(50% - 30px)}60%{left:calc(50% - 30px)}100%{left:calc(100% + 80px)}}
@keyframes chomp-top{0%,100%{transform:rotate(0)}50%{transform:rotate(-20deg)}}
@keyframes chomp-bottom{0%,100%{transform:rotate(0)}50%{transform:rotate(20deg)}}
@keyframes ghostFloat{0%,100%{transform:translateY(-50%)}50%{transform:translateY(calc(-50% - 8px))}}
@media(max-width:480px){.pacman{width:40px;height:40px}.pacman-top,.pacman-bottom{width:40px;height:20px}.pacman-top{border-radius:20px 20px 0 0}.pacman-bottom{border-radius:0 0 20px 20px}.pacman-eye{width:6px;height:6px;top:8px;left:22px}.ghost{width:30px;height:34px}.ghost-body{width:30px;height:28px;border-radius:15px 15px 0 0}}
</style>
</head>
<body>
<div class="maze-border"></div>
<div class="score">SCORE: <span>0</span></div>
<div class="container">
<div class="game-area">
<div class="dots-row">
<div class="dot"></div><div class="dot"></div><div class="dot"></div>
<div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>
<div class="digits">
<span class="digit">4</span><span class="digit">0</span><span class="digit">4</span>
</div>
<div class="pacman">
<div class="pacman-body">
<div class="pacman-eye"></div>
<div class="pacman-top"></div>
<div class="pacman-bottom"></div>
</div>
</div>
<div class="ghost">
<div class="ghost-body">
<div class="ghost-eye left"></div>
<div class="ghost-eye right"></div>
</div>
<div class="ghost-skirt"><span></span><span></span><span></span><span></span></div>
</div>
</div>
<p class="message">GAME OVER</p>
<p class="sub">The page you're looking for has been eaten.<br>It doesn't exist or has been moved.</p>
<a href="/" class="btn">← INSERT COIN TO CONTINUE</a>
</div>
<script>
const digits=document.querySelectorAll('.digit');
const dots=document.querySelectorAll('.dot');
const ghost=document.querySelector('.ghost');
const scoreEl=document.querySelector('.score span');
let score=0;
function runCycle(){
score=0;scoreEl.textContent='0';
digits.forEach(d=>d.classList.remove('eaten'));
dots.forEach(d=>d.classList.remove('eaten'));
ghost.classList.remove('eaten');
dots.forEach((dot,i)=>{
setTimeout(()=>{dot.classList.add('eaten');score+=10;scoreEl.textContent=score;},800+i*350);
});
setTimeout(()=>{digits[0].classList.add('eaten');score+=100;scoreEl.textContent=score;},2200);
setTimeout(()=>{digits[1].classList.add('eaten');score+=100;scoreEl.textContent=score;},2400);
setTimeout(()=>{digits[2].classList.add('eaten');score+=100;scoreEl.textContent=score;},2600);
setTimeout(()=>{ghost.classList.add('eaten');score+=200;scoreEl.textContent=score;},3200);
}
runCycle();
setInterval(runCycle,4000);
</script>
</body>
</html>
